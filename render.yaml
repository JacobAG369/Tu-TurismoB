services:
  # Servicio Web: Backend (Laravel + MongoDB)
  - type: web
    name: tutu-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    # Render free tier
    plan: free
    # Health check default route for Laravel 12
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          name: tutu-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: APP_KEY
        # Genera una key aleatoria en el primer despliegue
        generateValue: true
      - key: DB_CONNECTION
        value: mongodb
      - key: DB_HOST
        value: # TODO: Añade tu host de MongoDB Atlas aquí en el dashboard de Render
      - key: DB_PORT
        value: 27017
      - key: DB_DATABASE
        value: tu_turismo_db
      - key: DB_USERNAME
        value: # TODO: Añade el usuario de DB en el dashboard
      - key: DB_PASSWORD
        value: # TODO: Añade el password de DB en el dashboard
      - key: PORT
        value: 80 # Para coincidir con el EXPOSE 80 de nuestro Dockerfile
