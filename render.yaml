services:
  # Servicio Web 1: Backend API Principal (Laravel + Apache)
  - type: web
    name: tutu-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    # Render free tier
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          name: tutu-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: APP_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://tuturismo.vercel.app
      - key: SANCTUM_STATEFUL_DOMAINS
        value: tuturismo.vercel.app
      - key: SESSION_DOMAIN
        value: tuturismo.vercel.app
      - key: DB_CONNECTION
        value: mongodb
      - key: DB_DSN
        sync: false # Set this securely in the Render Dashboard
      - key: DB_DATABASE
        value: tu_turismo
      - key: PORT
        value: 80 # Requerido por nuestro Dockerfile (Apache)
      
      # WebSockets Config
      - key: REVERB_APP_ID
        sync: false # Set this securely in the Render Dashboard
      - key: REVERB_APP_KEY
        sync: false # Set this securely in the Render Dashboard
      - key: REVERB_APP_SECRET
        sync: false # Set this securely in the Render Dashboard
      - key: PUSHER_HOST
        fromService:
          type: web
          name: tutu-reverb
          envVarKey: RENDER_EXTERNAL_HOSTNAME # Se inyecta auto desde el otro servicio
      - key: PUSHER_PORT
        value: 443
      - key: PUSHER_SCHEME
        value: https

  # Servicio Web 2: Servidor de WebSockets Autónomo (Reverb)
  - type: web
    name: tutu-reverb
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    # Sobrescribimos el ENTRYPOINT para no correr Apache, solo Reverb
    dockerCommand: "php artisan reverb:start --host=0.0.0.0 --port=80"
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mongodb
      - key: DB_DSN
        sync: false # Set this securely in the Render Dashboard
      - key: REVERB_APP_ID
        sync: false # Set this securely in the Render Dashboard
      - key: REVERB_APP_KEY
        sync: false # Set this securely in the Render Dashboard
      - key: REVERB_APP_SECRET
        sync: false # Set this securely in the Render Dashboard
      - key: PORT
        value: 80 # Render nos exigirá escuchar en el puerto que le pasemos
